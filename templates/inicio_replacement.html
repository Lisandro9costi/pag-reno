<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='inicio.css') }}">
    <title>Document</title>
</head>
<body>
    {% if submitted %}
    <div style="background:#d4ffd4;padding:12px;border:1px solid #7ad07a;margin-bottom:12px;">
        Gracias — tu cuestionario se ha enviado correctamente.
    </div>
    {% endif %}
    <h1>Copa Renault</h1>
    <img id="deporteSeleccionado" src="{{ url_for('static', filename=deportes[0].imagen) if deportes else url_for('static', filename='img/futbol.png') }}" alt="Deporte seleccionado">
    
    <div class="deportes">
    {% for d in deportes %}
    <div class="deporte" onclick="cambiarDeporte({{ loop.index0 }})">
        {{ d.nombre }}
    </div>
    {% endfor %}

</div>
    <a href="{{ url_for('cantina') }}">CANTINA</a>
    <a href="{{ url_for('sponsors') }}">SPONSORS</a>




    <script>
    const imagen = document.getElementById("deporteSeleccionado");

    const deportes = [
    {% for d in deportes %}
        "{{ url_for('static', filename=d.imagen) }}"{{ ",\n" if not loop.last else "" }}
    {% endfor %}
    ];

    function cambiarDeporte(index){

        // efecto fade
        imagen.style.opacity = "0";

        setTimeout(() => {
            imagen.src = deportes[index];
            imagen.style.opacity = "1";
        }, 150);

    }
</script>
</body>
</html>
