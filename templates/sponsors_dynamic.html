<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='sponsors.css') }}">
    <title>Sponsors</title>
</head>
<body>

    <a class="back-btn" href="{{ url_for('inicio') }}">← Volver</a>

    <h1>SPONSORS</h1>

    <div class="contenedor-sponsors">

        {% for s in sponsors %}
        <div class="sponsor">

            <div class="superior">

                <div class="logo">
                    <img src="{{ url_for('static', filename=s.logo_url) if s.logo_url else url_for('static', filename='img/logo1.png') }}" alt="">
                </div>

                <div class="info">
                    <h2>{{ s.nombre }}</h2>
                    <p>{{ s.slogan }}</p>
                </div>

            </div>

            <div class="descripcion">
                {{ s.descripcion_breve }}
            </div>

        </div>
        {% endfor %}

    </div>

    <a href="#" class="seguir">
        Sigue para abajo
    </a>

</body>
</html>
